name: eval

on:
  pull_request:
    paths:
      - "forge/**"
      - "prompts/**"
      - "evals/**"
      - "cookbook/**"
      - "pyproject.toml"
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Smoke tests
        run: pytest -q

  eval-agents:
    runs-on: ubuntu-latest
    needs: smoke
    if: false   # flip on once a concrete agent + runner exist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run eval suite
        run: forge eval run java-lang-migrator
